/* --- JS FIX: Using safe hex codes instead of literal backticks to stop markdown corruption --- */
function stripCodeFences(text) {
  return text
    .replace(new RegExp('^[ \\t]*\\x60\\x60\\x60[a-zA-Z0-9\\-_]*[ \\t]*\\r?\\n', 'gm'), '')
    .replace(new RegExp('^[ \\t]*\\x60\\x60\\x60[ \\t]*(\\r?\\n|$)', 'gm'), '')
    .replace(/^[ \t]*~~~[a-zA-Z0-9\-_]*[ \t]*\r?\n/gm, '')
    .replace(/^[ \t]*~~~[ \t]*(\r?\n|$)/gm, '')
    .replace(/^[ \t]*\/\/\s*(OLD|NEW)\s*(CHUNK|BLOCK|CODE)?[ \t]*\r?\n/gim, '')
    .replace(/^(here(?:'s| is) (?:the )?(?:patch|code|result|fix|update):?\s*\n)/i, '')
    .trim();
}

function normaliseSplitTokens(text) {
  return text
    .replace(/={2,4}\s*SPLIT\s*={2,4}/gi, SPLIT_TOKEN)
    .replace(/={2,4}\s*BLOCK\s*={2,4}/gi, BLOCK_TOKEN)
    .replace(/^[ \t]*-{2,}\s*SPLIT\s*-{2,}[ \t]*$/gim, SPLIT_TOKEN)
    .replace(/^[ \t]*-{2,}\s*BLOCK\s*-{2,}[ \t]*$/gim, BLOCK_TOKEN);
}

function parseAllBlocks(text) {
  var cleaned = stripCodeFences(text);
  cleaned = normaliseSplitTokens(cleaned);
  cleaned = cleaned
    .replace(/\/\/\s*(OLD|NEW)\s*CHUNK\s*/gi, '')
    .replace(/#\s*(OLD|NEW)\s*CHUNK\s*/gi, '')
    .trim();

  if (sourceContent && cleaned.length > sourceContent.length * NUKE_THRESHOLD) {
    var ratio = ((cleaned.length / sourceContent.length) * 100).toFixed(0);
    addLog('warn', 'Nuke Warning: patch is ' + ratio + '% of file size.');
    toast('⚠ Patch is ' + ratio + '% of file size (Scenario 13).\nApplying anyway – use Undo if wrong.', 'warn', 6000);
  }

  var units = cleaned.split(new RegExp(BLOCK_TOKEN.replace(/=/g, '='), 'i'))
    .map(function(u) { return u.trim(); })
    .filter(Boolean);

  var blocks = [];
  units.forEach(function(u) {
    if (!u.includes(SPLIT_TOKEN)) return;
    var idx     = u.indexOf(SPLIT_TOKEN);
    var oldCode = u.slice(0, idx).trim();
    var newCode = u.slice(idx + SPLIT_TOKEN.length).trim();
    if (oldCode || newCode) blocks.push({ oldCode: oldCode, newCode: newCode });
  });

  return blocks;
}

function countOccurrences(source, chunk) {
  if (!chunk) return 0;
  var count = 0, pos = 0;
  while ((pos = source.indexOf(chunk, pos)) !== -1) { count++; pos++; }
  return count;
}

function buildResult(source, startIdx, matchedText) {
  var lineStartIdx = source.lastIndexOf('\n', startIdx - 1) + 1;
  var leadingSpace = source.substring(lineStartIdx, startIdx).match(/^[ \t]*/)[0];
  return { startIndex: startIdx, endIndex: startIdx + matchedText.length, baseIndent: leadingSpace, matchedText: matchedText };
}

function findFingerprintedChunk(source, chunk) {
  if (!chunk || !source) return null;
  var idx = source.indexOf(chunk);
  if (idx !== -1) {
    var total = countOccurrences(source, chunk);
    if (total > 1 && settings.warnAmbiguous) {
      toast('⚠ OLD block matched ' + total + '×. Patched first.\nExpand OLD block for precision.', 'warn', 5000);
      addLog('warn', 'Ambiguous match (' + total + 'x): ' + chunk.slice(0, 60).replace(/\n/g, '↵'));
    }
    return buildResult(source, idx, chunk);
  }

  // Prevent regex freezing on massive chunks
  if (chunk.length < 1500) {
    try {
      var esc = chunk.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')
                     .replace(/[ \t]+/g, '[ \\t]+')
                     .replace(/\n/g, '[ \\t]*\\n[ \\t]*'); 
      var rx  = new RegExp(esc);
      var m   = source.match(rx);
      if (m && m.index !== undefined) {
        addLog('info', 'Tier-2 fuzzy match (whitespace) applied.');
        return buildResult(source, m.index, m[0]);
      }
    } catch(e) {}

    try {
      var esc2 = chunk.replace(/[.*+?^${}()|[\]\\]/g, '\\$&').replace(/\s+/g, '\\s+');
      var allM = Array.from(source.matchAll(new RegExp(esc2, 'g')));
      if (allM.length > 0) {
        if (allM.length > 1 && settings.warnAmbiguous) {
          toast('⚠ Fuzzy match: ' + allM.length + '× matches. Patched first.', 'warn', 5000);
          addLog('warn', 'Ambiguous fuzzy match (' + allM.length + 'x).');
        }
        addLog('info', 'Tier-3 fuzzy match (aggressive whitespace) applied.');
        return buildResult(source, allM[0].index, allM[0][0]);
      }
    } catch(e) {}
  }

  var chunkLines = chunk.split('\n').map(function(l) { return l.trim(); }).filter(Boolean);
  if (chunkLines.length >= 3 && chunk.length < 3000) {
    var first = chunkLines[0].replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    var last  = chunkLines[chunkLines.length - 1].replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    try {
      var anchorRx = new RegExp(first + '[\\s\\S]{1,3000}?' + last);
      var aMatch   = source.match(anchorRx);
      if (aMatch && aMatch.index !== undefined) {
        addLog('warn', 'Tier-4 anchor match used – verify result.');
        toast('⚠ Used anchor match (Tier 4). Verify patch.', 'warn', 4000);
        return buildResult(source, aMatch.index, aMatch[0]);
      }
    } catch(e) {}
  }

  var singleLine = chunk.trim();
  if (!singleLine.includes('\n')) {
    var escapedLine = singleLine.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    try {
      var lineRx = new RegExp('^[ \\t]*' + escapedLine + '[ \\t]*$', 'm');
      var lm     = source.match(lineRx);
      if (lm && lm.index !== undefined) {
        addLog('info', 'Tier-5 single-line match used.');
        return buildResult(source, lm.index, lm[0]);
      }
    } catch(e) {}
  }

  return null;
}

function reindent(code, baseIndent) {
  if (!code || !settings.indentFix) return code;
  var lines    = code.split('\n');
  var nonEmpty = lines.filter(function(l) { return l.trim(); });
  if (nonEmpty.length === 0) return code;
  var minIndent = Math.min.apply(null, nonEmpty.map(function(l) { return l.match(/^[ \t]*/)[0].length; }));
  if (minIndent === baseIndent.length) return code;
  return lines.map(function(l, i) {
    if (i === 0 || !l.trim()) return l;
    return baseIndent + l.slice(minIndent);
  }).join('\n');
}

function autoLockAndApply(parsed, blockNum) {
  if (!sourceContent) { addLog('err', 'No source loaded.'); return false; }

  if (!parsed.oldCode) {
    if (parsed.newCode) {
      pushState();
      if (/<body[^>]*>/i.test(sourceContent)) {
        sourceContent = sourceContent.replace(/(<body[^>]*>)/i, '$1\n' + parsed.newCode);
      } else {
        sourceContent = parsed.newCode + '\n' + sourceContent;
      }
      render(sourceContent, false); updateStatusBar();
      addLog('ok', 'Block ' + blockNum + ': injected (empty OLD → prepend).');
      return true;
    }
    return false;
  }

  var loc = findFingerprintedChunk(sourceContent, parsed.oldCode);
  if (!loc) {
    var preview = parsed.oldCode.substring(0, 60).replace(/\n/g, '↵');
    var errMsg  = 'Block ' + blockNum + ': no match found.\n"' + preview + '…"';
    toast(errMsg, 'err', 7000);
    addLog('err', 'Block ' + blockNum + ' MISS: "' + preview + '"');
    return false;
  }

  pushState();
  var fixedNew = fixEncoding(parsed.newCode.replace(/\r\n/g, '\n').replace(/\r/g, '\n'));
  var newT     = reindent(fixedNew, loc.baseIndent);
  sourceContent = sourceContent.slice(0, loc.startIndex) + newT + sourceContent.slice(loc.endIndex);
  render(sourceContent, false);
  updateStatusBar();
  addLog('ok', 'Block ' + blockNum + ' applied. Δ ' + (loc.matchedText.length - newT.length) + ' chars.');
  return astGuardAfterApply();
}

function doPaste(raw) {
  if (!raw || !raw.trim()) {
    toast('Clipboard is empty.', 'warn');
    return;
  }

  var fixed = fixEncoding(raw);
  if (fixed !== raw) {
    addLog('info', 'Encoding fixed in pasted content.');
    raw = fixed;
  }

  if (!sourceContent && (/<!doctype\s+html/i.test(raw) || /<html[\s>]/i.test(raw))) {
    sourceContent = raw.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
    showControls();
    render(sourceContent, false);
    toast('Initialised from clipboard!');
    addLog('ok', 'Initialised from full HTML paste (' + (sourceContent.length / 1024).toFixed(1) + ' KB).');
    updateStatusBar();
    return;
  }

  if (!sourceContent) {
    toast('Load a file first, or paste a full HTML page.', 'warn', 4000);
    return;
  }

  var blocks = parseAllBlocks(raw);
  if (blocks.length === 0) {
    if (raw.includes('<') || raw.includes('function') || raw.includes('{')) {
      toast('No ===SPLIT=== found.\nDid you forget to use the Super Prompt?\nIf pasting full HTML, paste when no file is loaded.', 'err', 7000);
    } else {
      toast('No valid ===SPLIT=== blocks found.\nCheck separator or stray fences.', 'err', 5000);
    }
    addLog('err', 'Parse failed: no SPLIT blocks in clipboard.');
    return;
  }

  showProgress(10);
  var applied  = 0;
  var total    = blocks.length;

  for (var bi = blocks.length - 1; bi >= 0; bi--) {
    showProgress(10 + ((total - bi) / total) * 80);
    var ok = autoLockAndApply(blocks[bi], bi + 1);
    if (ok) { applied++; }
    else if (!ok && applied < total - bi) { break; } 
  }

  hideProgress();

  if (applied > 0) {
    toast('✓ Applied ' + applied + '/' + total + ' patch(es)!', applied === total ? 'ok' : 'warn');
    addLog('ok', 'Applied ' + applied + '/' + total + ' blocks.');
  } else {
    toast('✗ No patches applied. Check the log.', 'err', 5000);
    addLog('err', 'Zero blocks applied from ' + total + ' parsed.');
  }
}

document.addEventListener('paste', function(e) {
  if (document.activeElement && (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA' || document.activeElement.id === 'codeView')) return;
  var raw = (e.clipboardData || window.clipboardData).getData('text');
  if (raw) doPaste(raw);
});

document.getElementById('pasteBtn').addEventListener('click', function() {
  toggleMenu();
  showProgress(5);
  if (!navigator.clipboard || !navigator.clipboard.readText) {
    toast('Clipboard API unavailable – try Ctrl+Shift+V or allow clipboard permission.', 'warn', 5000);
    hideProgress(); return;
  }
  navigator.clipboard.readText()
    .then(function(raw) { doPaste(raw); })
    .catch(function(err) {
      hideProgress();
      var msg = err.name === 'NotAllowedError'
        ? 'Clipboard permission denied.\nAllow clipboard access in browser settings.'
        : 'Could not read clipboard: ' + err.message;
      toast(msg, 'err', 6000);
      addLog('err', 'Clipboard read failed: ' + err.message);
    });
});

document.getElementById('ghSettingsBtn').addEventListener('click', function() {
  toggleMenu();
  document.getElementById('ghToken').value = ghToken;
  document.getElementById('ghUser').value = ghUser;
  document.getElementById('ghBranch').value = ghBranch;
  document.getElementById('ghFilePath').value = ghFilePath;
  document.getElementById('ghConfigPanel').classList.add('open');
  $backdrop.classList.add('open');
});

document.getElementById('ghClosePanelBtn').addEventListener('click', function() {
  document.getElementById('ghConfigPanel').classList.remove('open');
  $backdrop.classList.remove('open');
});

document.getElementById('ghSaveBtn').addEventListener('click', function() {
  ghToken = document.getElementById('ghToken').value.trim();
  ghUser = document.getElementById('ghUser').value.trim();
  ghBranch = document.getElementById('ghBranch').value.trim() || 'main';
  ghFilePath = document.getElementById('ghFilePath').value.trim() || 'index.html';
  ghSaveConfig();
  document.getElementById('ghConfigPanel').classList.remove('open');
  $backdrop.classList.remove('open');

});

document.getElementById('ghFetchReposBtn').addEventListener('click', function() {
  ghToken = document.getElementById('ghToken').value.trim();
  ghFetchAllRepos();
});

window.syncCurrentFile = async function() {
  if (!ghToken || !ghRepo) { toast('❌ Configure GitHub settings and select a repo first.', 'warn'); return; }
  showProgress(20);
  try {
    toast('🔄 Syncing from GitHub...', 'info');
    
    const repoRes = await fetch(`https://api.github.com/repos/${ghRepo}`, { headers: { Authorization: `token ${ghToken}`, Accept: 'application/vnd.github.v3+json' }});
    if (repoRes.ok) {
       const repoInfo = await repoRes.json();
       if (repoInfo.default_branch && ghBranch !== repoInfo.default_branch) {
           ghBranch = repoInfo.default_branch;
           document.getElementById('ghBranch').value = ghBranch;
           ghSaveConfig();
       }
    }

    const url = `https://api.github.com/repos/${ghRepo}/contents/${ghFilePath}?ref=${ghBranch}`;
    const res = await fetch(url, { headers: { Authorization: `token ${ghToken}`, Accept: 'application/vnd.github.v3+json' }, cache: 'no-store' });
    
    if (!res.ok) {
        if (res.status === 404) {
            toast(`ℹ ${ghFilePath} not found in ${ghBranch}. Ready to create new!`, 'info', 4000);
            addLog('info', `File ${ghFilePath} does not exist yet. Ready for push.`);
            document.getElementById('ghPushBtn').disabled = false;
            hideProgress();
            return; 
        }
        throw new Error(res.statusText);
    }

    const data = await res.json();
    
    // Image Preview Logic Route
    const ext = ghFilePath.split('.').pop().toLowerCase();
    const isImage = ['png', 'jpg', 'jpeg', 'gif', 'svg', 'webp', 'ico'].includes(ext);

    if (isImage) {
        const mime = ext === 'svg' ? 'image/svg+xml' : `image/${ext}`;
        const dataUri = `data:${mime};base64,${data.content.replace(/\s/g, '')}`;
        
        viewMode = 'preview';
        $pv.style.display = 'block';
        $codeView.style.display = 'none';
        document.getElementById('emptyState').style.display = 'none';
        
        $pv.srcdoc = `<html style="height:100%;display:flex;align-items:center;justify-content:center;background:#000;"><img src="${dataUri}" style="max-width:100%;max-height:100%;object-fit:contain;background:url('data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 2 2%22><path d=%22M1 2V0h1v1H0v1z%22 fill-opacity=%22.05%22/></svg>')"></html>`;
        
        sourceContent = ''; 
        $codeView.value = '';

        toast(`✅ Loaded Image: ${ghFilePath.split('/').pop()}`);
        addLog('ok', `Synced Image ${ghFilePath}`);
        document.getElementById('ghPushBtn').disabled = true; 
        hideProgress();
        return;
    }

    /* --- JS FIX: Safe TextDecoder for UTF-8 compatibility (Emojis/Foreign Characters) --- */
    const binaryString = atob(data.content.replace(/\s/g, ''));
    const len = binaryString.length;
    const bytes = new Uint8Array(len);
    for (let i = 0; i < len; i++) {
        bytes[i] = binaryString.charCodeAt(i);
    }
    sourceContent = new TextDecoder('utf-8').decode(bytes);
    
    fileName = ghFilePath.split('/').pop() || 'index.html';
    
    viewMode = 'preview'; // Reset to standard preview mode after sync
    render(sourceContent, false);
    showControls();
    document.getElementById('ghPushBtn').disabled = false;
    toast(`✅ Loaded ${fileName} from ${ghRepo}`);
    addLog('ok', `Synced ${ghFilePath} from ${ghRepo}`);
    undoStack = []; redoStack = []; syncUndoRedo(); updateStatusBar();
  } catch(e) {
    toast('❌ Sync failed: ' + e.message, 'err');
    addLog('err', 'GitHub Sync Error: ' + e.message);
  }
  hideProgress();
};

document.getElementById('ghSyncBtn').addEventListener('click', async function() {
  toggleMenu();
  await syncCurrentFile();
});

document.getElementById('ghPushBtn').addEventListener('click', function() {
  toggleMenu();
  syncEditorToSource();
  if (!sourceContent) { toast('❌ Nothing to push.', 'warn'); return; }
  if (!ghToken || !ghRepo) { toast('❌ Configure GitHub first.', 'warn'); return; }
  const ts = new Date().toISOString().replace('T',' ').slice(0,19);
  document.getElementById('commitMsgInput').value = `Update ${ghFilePath} via AI Compile – ${ts}`;
  document.getElementById('commitModal').classList.add('open');
  $backdrop.classList.add('open');
});

document.getElementById('cmCancelBtn').addEventListener('click', function() {
  document.getElementById('commitModal').classList.remove('open');
  $backdrop.classList.remove('open');
});

document.getElementById('cmConfirmBtn').addEventListener('click', async function() {
  syncEditorToSource();
  const msg = document.getElementById('commitMsgInput').value.trim();
  if (!msg) { toast('❌ Enter a commit message', 'warn'); return; }
  document.getElementById('commitModal').classList.remove('open');
  $backdrop.classList.remove('open');
  
  const btn = document.getElementById('ghPushBtn');
  btn.disabled = true;
  showProgress(30);
  try {
    toast('⬆ Pushing to GitHub...', 'info');
    let sha = null;
    const getUrl = `https://api.github.com/repos/${ghRepo}/contents/${ghFilePath}?ref=${ghBranch}`;
    const getRes = await fetch(getUrl, { headers: { Authorization: `token ${ghToken}`, Accept: 'application/vnd.github.v3+json' }, cache: 'no-store' });
    if (getRes.ok) {
      const getData = await getRes.json();
      sha = getData.sha;
    }
    
    const encoded = btoa(unescape(encodeURIComponent(sourceContent)));
    const body = { message: msg, content: encoded, branch: ghBranch };
    if (sha) body.sha = sha;

    const putRes = await fetch(`https://api.github.com/repos/${ghRepo}/contents/${ghFilePath}`, {
      method: 'PUT',
      headers: { Authorization: `token ${ghToken}`, Accept: 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    if (putRes.ok) {
      toast('✅ Pushed to GitHub!');
      addLog('ok', `Pushed ${ghFilePath} to ${ghRepo}`);
    } else {
      const errData = await putRes.json().catch(()=>({}));
      throw new Error(errData.message || putRes.statusText);
    }
  } catch(e) {
    toast('❌ Push failed: ' + e.message, 'err');
    addLog('err', 'GitHub Push Error: ' + e.message);
  } finally {
    btn.disabled = false;
    hideProgress();
  }
});

$backdrop.addEventListener('click', function() {
  document.getElementById('ghConfigPanel').classList.remove('open');
  document.getElementById('commitModal').classList.remove('open');
  document.getElementById('newRepoModal').classList.remove('open');
  document.getElementById('wallpaperModal').classList.remove('open');
});

document.addEventListener('dragover', function(e) { e.preventDefault(); });
document.addEventListener('drop', function(e) {
  e.preventDefault();
  // Safe-guard to ignore simple text selection drops that were causing your refresh loop
  if (!e.dataTransfer || !e.dataTransfer.types.includes('Files')) return;
  if (!e.dataTransfer.files || e.dataTransfer.files.length === 0) return;
  
  var file = e.dataTransfer.files[0];
  if (!file) return;
  
  var reader = new FileReader();
  reader.onload = function(ev) {
    fileName      = file.name;
    sourceContent = ev.target.result.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
    showControls();
    
    ghFilePath = fileName;
    document.getElementById('ghFilePath').value = ghFilePath;
    ghSaveConfig();
    document.getElementById('ghPushBtn').disabled = !(ghRepo && ghToken);

    undoStack = []; redoStack = []; syncUndoRedo();
    render(sourceContent, false); updateStatusBar();
    toast('Dropped Local: ' + fileName, 'ok'); addLog('ok', 'Drag-drop loaded: ' + fileName);
  };
  reader.readAsText(file, 'UTF-8');
});

window.addEventListener('resize', function() {
  if ($appMenu.classList.contains('open')) updateMenuPosition();
});

window.addEventListener('beforeunload', function(e) {
  if (undoStack.length > 0) {
    e.preventDefault();
    e.returnValue = 'You have unsaved patches. Export before leaving?';
  }
});

updateMenuPosition();
sourceContent = '';
render('', false); 
addLog('info', 'AI Compile PRO Sovereign IDE ready.');
</script>
